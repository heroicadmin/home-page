<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Limit Break</title>
  <meta name="description" content="Tools and platforms built by Limit Break." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
/* ───────────────────────────────────────── Reset & Base ───────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root { --bg:#0a0a0a; --surface:#111111; --surface2:#181818; --border:rgba(255,255,255,0.07); --border-hover:rgba(255,255,255,0.15); --text:#f0f0f0; --text-muted:#6b6b6b; --text-dim:#3a3a3a; --accent:#ffffff; --radius:16px; --radius-sm:8px; --font-head:'Sora',sans-serif; --font-body:'DM Sans',sans-serif; }
html { font-size:16px; -webkit-font-smoothing:antialiased; -moz-osx-font-smoothing:grayscale; }
body { background:var(--bg); color:var(--text); font-family:var(--font-body); font-weight:300; min-height:100vh; display:flex; flex-direction:column; position:relative; overflow-x:hidden; }
#bg-canvas { position:fixed; inset:0; width:100%; height:100%; z-index:0; pointer-events:none; }
.noise { pointer-events:none; position:fixed; inset:0; z-index:0; opacity:0.025; background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E"); background-repeat:repeat; background-size:128px; }
/* Header */
.header { position:relative; z-index:20; border-bottom:1px solid var(--border); padding:0 40px; }
.header-inner { max-width:1200px; margin:0 auto; height:64px; display:flex; align-items:center; justify-content:space-between; }
.wordmark { font-family:var(--font-head); font-weight:700; font-size:1rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--text); }
.wordmark span { color:var(--text-muted); }
.header-meta { font-size:0.75rem; color:var(--text-muted); letter-spacing:0.08em; text-transform:uppercase; }
/* Main */
.main { position:relative; z-index:10; flex:1; max-width:1200px; width:100%; margin:0 auto; padding:0 40px 80px; }
/* Hero */
.hero { padding:100px 0 72px; max-width:640px; animation:fadeUp 0.6s ease both; }
.hero-label { font-size:0.72rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-muted); margin-bottom:20px; }
.hero-title { font-family:var(--font-head); font-weight:700; font-size:clamp(2.8rem,5vw,4.5rem); line-height:1.05; letter-spacing:-0.03em; color:var(--text); margin-bottom:24px; }
.hero-sub { font-size:1rem; line-height:1.7; color:var(--text-muted); max-width:480px; }
/* Tools */
.tools-section { animation:fadeUp 0.6s 0.15s ease both; }
.tools-header { display:flex; align-items:baseline; gap:12px; margin-bottom:24px; }
.tools-label { font-size:0.72rem; letter-spacing:0.16em; text-transform:uppercase; color:var(--text-muted); }
.tools-count { font-size:0.72rem; color:var(--text-dim); letter-spacing:0.05em; }
.tools-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(320px,1fr)); gap:16px; }
/* Tool Card */
.tool-card { display:flex; flex-direction:column; gap:0; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); padding:28px; text-decoration:none; color:var(--text); position:relative; overflow:hidden; will-change:transform; transition:border-color 0.2s ease,background 0.2s ease,box-shadow 0.2s ease; animation:fadeUp 0.5s ease both; --mx:50%; --my:0%; }
.tool-card::before { content:''; position:absolute; inset:0; border-radius:var(--radius); background:radial-gradient(360px circle at var(--mx,50%) var(--my,0%),rgba(255,255,255,0.06),transparent 65%); pointer-events:none; opacity:0; transition:opacity 0.25s ease; }
.tool-live:hover { border-color:var(--border-hover); background:var(--surface2); box-shadow:0 20px 60px rgba(0,0,0,0.5); }
.tool-live:hover::before { opacity:1; }
.tool-soon { cursor:default; opacity:0.45; }
.tool-top { display:flex; align-items:center; justify-content:space-between; margin-bottom:20px; }
.tool-icon { font-size:1.4rem; line-height:1; }
.tool-badge { font-size:0.68rem; letter-spacing:0.1em; text-transform:uppercase; font-weight:500; padding:4px 10px; border-radius:100px; display:flex; align-items:center; gap:6px; }
.badge-live { background:rgba(255,255,255,0.06); color:var(--text); border:1px solid rgba(255,255,255,0.12); }
.badge-soon { background:transparent; color:var(--text-muted); border:1px solid var(--border); }
.badge-dot { width:6px; height:6px; border-radius:50%; background:#4ade80; box-shadow:0 0 6px #4ade80; animation:pulse-dot 2s ease infinite; }
.tool-body { flex:1; }
.tool-name { font-family:var(--font-head); font-weight:600; font-size:1.25rem; letter-spacing:-0.02em; margin-bottom:6px; color:var(--text); }
.tool-tagline { font-size:0.82rem; color:var(--text-muted); margin-bottom:12px; letter-spacing:0.01em; }
.tool-desc { font-size:0.85rem; line-height:1.65; color:var(--text-muted); }
.tool-footer { display:flex; align-items:center; justify-content:space-between; margin-top:24px; padding-top:20px; border-top:1px solid var(--border); }
.tool-url { font-size:0.78rem; color:var(--text-muted); font-family:'JetBrains Mono',monospace; letter-spacing:0.02em; }
.tool-url.muted { color:var(--text-dim); }
.tool-arrow { font-size:1rem; color:var(--text-muted); transition:color 0.2s ease,transform 0.2s ease; }
.tool-live:hover .tool-arrow { color:var(--text); transform:translate(2px,-2px); }
.tool-live::after { content:''; position:absolute; top:0; left:24px; right:24px; height:1px; background:linear-gradient(90deg,transparent,var(--tool-color,#fff),transparent); opacity:0.3; }
/* Footer */
.footer { position:relative; z-index:10; border-top:1px solid var(--border); padding:0 40px; }
.footer-inner { max-width:1200px; margin:0 auto; height:56px; display:flex; align-items:center; justify-content:space-between; }
.footer-wordmark { font-family:var(--font-head); font-size:0.7rem; font-weight:700; letter-spacing:0.2em; text-transform:uppercase; color:var(--text-dim); }
.footer-copy { font-size:0.72rem; color:var(--text-dim); letter-spacing:0.05em; }
/* Animations */
@keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:0.4} }
/* Responsive */
@media(max-width:768px) { .header{padding:0 20px} .main{padding:0 20px 60px} .footer{padding:0 20px} .hero{padding:64px 0 48px} .hero-title{font-size:2.4rem} .tools-grid{grid-template-columns:1fr} }
@media(max-width:480px) { .header-meta{display:none} .hero-title{font-size:2rem} }
  </style>
</head>
<body>

  <canvas id="bg-canvas"></canvas>
  <div class="noise"></div>

  <header class="header">
    <div class="header-inner">
      <div class="wordmark">LIMIT<span>BREAK</span></div>
      <div class="header-meta">Tools &amp; Platforms</div>
    </div>
  </header>

  <main class="main">

    <section class="hero">
      <p class="hero-label">Internal Tooling</p>
      <h1 class="hero-title">Everything in<br />one place.</h1>
      <p class="hero-sub">A suite of tools built to support HEROIC operations — from social tracking to internal ops.</p>
    </section>

    <section class="tools-section">
      <div class="tools-header">
        <span class="tools-label">Tools</span>
        <span id="tool-count" class="tools-count"></span>
      </div>
      <div class="tools-grid" id="tools-grid">
        <!-- Populated by JS -->
      </div>
    </section>

  </main>

  <footer class="footer">
    <div class="footer-inner">
      <span class="footer-wordmark">LIMIT BREAK</span>
      <span class="footer-copy">Internal use only</span>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.min.js"></script>
  <script>
  // ─────────────────────────────────────────────────────────────
  //  Three.js — Particle Network Background
  // ─────────────────────────────────────────────────────────────
  (function initScene() {
    const canvas = document.getElementById('bg-canvas');
    const scene  = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(50, innerWidth / innerHeight, 1, 3000);
    camera.position.z = 500;

    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
    renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
    renderer.setSize(innerWidth, innerHeight);
    renderer.setClearColor(0x000000, 0);

    // ── Particle count (lower on mobile) ──────────────────────
    const COUNT    = innerWidth < 768 ? 80 : 190;
    const MAX_DIST = 155;
    const HALF_W   = 640;
    const HALF_H   = 380;

    // ── Positions & velocities ────────────────────────────────
    const pPos = new Float32Array(COUNT * 3);
    const pVel = Array.from({ length: COUNT }, () => ({
      x: (Math.random() - 0.5) * 0.22,
      y: (Math.random() - 0.5) * 0.22,
    }));
    for (let i = 0; i < COUNT; i++) {
      pPos[i*3]   = (Math.random() - 0.5) * HALF_W * 2;
      pPos[i*3+1] = (Math.random() - 0.5) * HALF_H * 2;
      pPos[i*3+2] = (Math.random() - 0.5) * 80;
    }

    // ── Soft circular glow texture for particles ──────────────
    const ptc = document.createElement('canvas');
    ptc.width = ptc.height = 32;
    const ptx = ptc.getContext('2d');
    const g   = ptx.createRadialGradient(16,16,0, 16,16,16);
    g.addColorStop(0,   'rgba(255,255,255,1)');
    g.addColorStop(0.3, 'rgba(255,255,255,0.5)');
    g.addColorStop(1,   'rgba(255,255,255,0)');
    ptx.fillStyle = g;
    ptx.fillRect(0, 0, 32, 32);

    // ── Points ────────────────────────────────────────────────
    const pGeo = new THREE.BufferGeometry();
    pGeo.setAttribute('position', new THREE.BufferAttribute(pPos, 3));
    const pMat = new THREE.PointsMaterial({
      color:       0xffffff,
      size:        5,
      map:         new THREE.CanvasTexture(ptc),
      transparent: true,
      opacity:     0.4,
      depthWrite:  false,
      blending:    THREE.AdditiveBlending,
      sizeAttenuation: true,
    });
    scene.add(new THREE.Points(pGeo, pMat));

    // ── Lines (pre-allocated buffer, no GC per frame) ─────────
    const MAX_SEGS = Math.floor(COUNT * (COUNT - 1) / 2);
    const lPos = new Float32Array(MAX_SEGS * 6);
    const lCol = new Float32Array(MAX_SEGS * 6);

    const lGeo = new THREE.BufferGeometry();
    lGeo.setAttribute('position', new THREE.BufferAttribute(lPos, 3));
    lGeo.setAttribute('color',    new THREE.BufferAttribute(lCol, 3));
    lGeo.setDrawRange(0, 0);

    const lMat = new THREE.LineBasicMaterial({
      vertexColors: true,
      transparent:  true,
      opacity:      1,
      depthWrite:   false,
      blending:     THREE.AdditiveBlending,
    });
    scene.add(new THREE.LineSegments(lGeo, lMat));

    // ── Mouse tracking (converted to world space) ─────────────
    const mouseW = { x: 0, y: 0 };
    window.addEventListener('mousemove', (e) => {
      const vFov = camera.fov * Math.PI / 180;
      const vH   = 2 * camera.position.z * Math.tan(vFov / 2);
      const vW   = vH * camera.aspect;
      mouseW.x = ((e.clientX / innerWidth)  * 2 - 1) * (vW / 2);
      mouseW.y = (-(e.clientY / innerHeight) * 2 + 1) * (vH / 2);
    });

    window.addEventListener('resize', () => {
      camera.aspect = innerWidth / innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(innerWidth, innerHeight);
    });

    // ── Animation loop ────────────────────────────────────────
    const REPULSE_R = 160;
    const DAMPING   = 0.975;
    const MAX_SPD   = 1.8;
    const MD2       = MAX_DIST * MAX_DIST;

    function animate() {
      requestAnimationFrame(animate);
      const pos = pGeo.attributes.position.array;

      for (let i = 0; i < COUNT; i++) {
        const ix = i * 3;
        const px = pos[ix], py = pos[ix+1];
        const dx = px - mouseW.x, dy = py - mouseW.y;
        const dist = Math.sqrt(dx*dx + dy*dy);

        if (dist < REPULSE_R && dist > 0.5) {
          const f = (1 - dist / REPULSE_R) * 1.4;
          pVel[i].x += (dx / dist) * f;
          pVel[i].y += (dy / dist) * f;
        }
        pVel[i].x *= DAMPING;
        pVel[i].y *= DAMPING;
        const spd = Math.sqrt(pVel[i].x**2 + pVel[i].y**2);
        if (spd > MAX_SPD) { pVel[i].x *= MAX_SPD/spd; pVel[i].y *= MAX_SPD/spd; }

        pos[ix]   += pVel[i].x;
        pos[ix+1] += pVel[i].y;
        if (pos[ix]   >  HALF_W) pos[ix]   = -HALF_W;
        if (pos[ix]   < -HALF_W) pos[ix]   =  HALF_W;
        if (pos[ix+1] >  HALF_H) pos[ix+1] = -HALF_H;
        if (pos[ix+1] < -HALF_H) pos[ix+1] =  HALF_H;
      }
      pGeo.attributes.position.needsUpdate = true;

      // Build connections
      let seg = 0;
      for (let i = 0; i < COUNT; i++) {
        for (let j = i+1; j < COUNT; j++) {
          const ax=pos[i*3], ay=pos[i*3+1], az=pos[i*3+2];
          const bx=pos[j*3], by=pos[j*3+1], bz=pos[j*3+2];
          const d2 = (ax-bx)**2 + (ay-by)**2;
          if (d2 < MD2) {
            const t = (1 - Math.sqrt(d2) / MAX_DIST) * 0.22; // max brightness
            const si = seg * 6;
            lPos[si]  =ax; lPos[si+1]=ay; lPos[si+2]=az;
            lPos[si+3]=bx; lPos[si+4]=by; lPos[si+5]=bz;
            lCol[si]  =t;  lCol[si+1]=t;  lCol[si+2]=t;
            lCol[si+3]=t;  lCol[si+4]=t;  lCol[si+5]=t;
            seg++;
          }
        }
      }
      lGeo.setDrawRange(0, seg * 2);
      lGeo.attributes.position.needsUpdate = true;
      lGeo.attributes.color.needsUpdate    = true;

      renderer.render(scene, camera);
    }
    animate();
  })();

  // ─────────────────────────────────────────────────────────────
  //  Tool Cards
  // ─────────────────────────────────────────────────────────────
  async function loadTools() {
    const res   = await fetch('tools.json');
    const tools = await res.json();

    const grid    = document.getElementById('tools-grid');
    const countEl = document.getElementById('tool-count');
    const live    = tools.filter(t => t.status === 'live').length;
    countEl.textContent = `${live} live · ${tools.length} total`;

    tools.forEach((tool, i) => {
      const isLive = tool.status === 'live';
      const card   = document.createElement('a');
      card.className = `tool-card ${isLive ? 'tool-live' : 'tool-soon'}`;
      card.href      = isLive && tool.url ? tool.url : '#';
      if (isLive) { card.target = '_blank'; card.rel = 'noopener noreferrer'; }
      else        { card.addEventListener('click', e => e.preventDefault()); }

      card.style.setProperty('--tool-color', tool.color);
      card.style.animationDelay = `${i * 90}ms`;

      card.innerHTML = `
        <div class="tool-top">
          <span class="tool-icon">${tool.icon}</span>
          <span class="tool-badge ${isLive ? 'badge-live' : 'badge-soon'}">
            ${isLive ? '<span class="badge-dot"></span> Live' : 'Soon'}
          </span>
        </div>
        <div class="tool-body">
          <h2 class="tool-name">${tool.name}</h2>
          <p class="tool-tagline">${tool.tagline}</p>
          <p class="tool-desc">${tool.description}</p>
        </div>
        <div class="tool-footer">
          ${isLive
            ? `<span class="tool-url">${tool.url.replace('https://', '')}</span><span class="tool-arrow">↗</span>`
            : `<span class="tool-url muted">—</span>`
          }
        </div>
      `;

      // 3D tilt on live cards
      if (isLive) {
        let raf = null;
        card.addEventListener('mousemove', (e) => {
          if (raf) cancelAnimationFrame(raf);
          raf = requestAnimationFrame(() => {
            const r  = card.getBoundingClientRect();
            const dx = (e.clientX - r.left - r.width  / 2) / (r.width  / 2);
            const dy = (e.clientY - r.top  - r.height / 2) / (r.height / 2);
            card.style.transition = 'border-color 0.2s, background 0.2s, box-shadow 0.2s';
            card.style.transform  = `perspective(900px) rotateY(${dx*9}deg) rotateX(${-dy*9}deg) translateZ(10px)`;
          });
        });
        card.addEventListener('mouseleave', () => {
          if (raf) cancelAnimationFrame(raf);
          card.style.transition = 'border-color 0.2s, background 0.2s, box-shadow 0.2s, transform 0.55s cubic-bezier(0.23,1,0.32,1)';
          card.style.transform  = '';
        });
      }

      grid.appendChild(card);
    });
  }

  loadTools();

  // Mouse-tracked radial glow inside each card
  document.addEventListener('mousemove', (e) => {
    document.querySelectorAll('.tool-card').forEach(card => {
      const r = card.getBoundingClientRect();
      card.style.setProperty('--mx', `${((e.clientX - r.left) / r.width)  * 100}%`);
      card.style.setProperty('--my', `${((e.clientY - r.top)  / r.height) * 100}%`);
    });
  });
  </script>

</body>
</html>
